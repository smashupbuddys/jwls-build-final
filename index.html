<!DOCTYPE html>
<html>
<head>
  <!--
    JWLS Mobile - Production-Optimized Web App
    ==========================================
    - Uses CanvasKit renderer for smooth 60fps animations
    - Hardware-accelerated graphics via WebGL
    - Service worker for offline support
    - Optimized asset loading
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="JWLS - Jewelry Management System">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- Performance hints -->
  <meta http-equiv="X-DNS-Prefetch-Control" content="on">
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://fonts.gstatic.com">
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="JWLS">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- Material Icons font for Flutter Web (preloaded for faster rendering) -->
  <link rel="preload" href="https://fonts.googleapis.com/icon?family=Material+Icons" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <link rel="preload" href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <link rel="preload" href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  </noscript>

  <title>JWLS - Jewelry Management</title>
  <link rel="manifest" href="manifest.json">

  <!-- 3D Model Viewer for flutter_3d_controller package -->
  <script type="module" src="./assets/packages/flutter_3d_controller/assets/model_viewer.min.js" defer></script>

  <!-- Minimal loading screen styles matching Flutter splash -->
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0F172A;
    }

    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #0F172A;
      z-index: 9999;
      transition: opacity 0.2s ease-out;
    }

    .loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-spinner {
      width: 24px;
      height: 24px;
      border: 1.5px solid rgba(255,255,255,0.15);
      border-top-color: rgba(255,255,255,0.4);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Minimal loading screen matching Flutter splash -->
  <div id="loading-screen" class="loading-screen">
    <div class="loading-spinner"></div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    // =========================================================================
    // PRODUCTION FLUTTER WEB CONFIGURATION (Flutter 3.22+)
    // =========================================================================
    // - Smart renderer selection: CanvasKit for desktop, HTML for mobile
    // - Service worker for offline support and caching
    // - Optimized loading with progress indication
    // =========================================================================

    // Detect if device is mobile for renderer selection
    function isMobileDevice() {
      return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
        || (navigator.maxTouchPoints > 0 && window.innerWidth < 1024);
    }

    // Register service worker for offline support
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('flutter_service_worker.js?v=3276451577') /* Flutter's service worker is deprecated and will be removed in a future Flutter release. */.then(function(registration) {
          console.log('ServiceWorker registered: ', registration.scope);
        }).catch(function(error) {
          console.log('ServiceWorker registration failed: ', error);
        });
      });
    }

    window.addEventListener('load', function() {
      // Wait for flutter_bootstrap.js to load and create _flutter object
      if (window._flutter && window._flutter.loader) {
        window._flutter.loader.load({
          onEntrypointLoaded: async function(engineInitializer) {
            // Using HTML renderer to avoid CanvasKit font binding issues
            // CanvasKit has known issues with Google Fonts in debug mode
            // TODO: Switch back to canvaskit for production after Flutter fixes the font binding bug
            const renderer = "html";

            const appRunner = await engineInitializer.initializeEngine({
              renderer: renderer,
              useColorEmoji: true,
            });
            await appRunner.runApp();

            // Hide loading screen with smooth transition
            const loadingScreen = document.getElementById('loading-screen');
            if (loadingScreen) {
              loadingScreen.classList.add('hidden');
              setTimeout(() => loadingScreen.remove(), 200);
            }
          }
        });
      }
    });
  </script>
</body>
</html>
